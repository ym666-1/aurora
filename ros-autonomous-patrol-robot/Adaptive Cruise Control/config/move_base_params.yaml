shutdown_costmaps: false

controller_frequency: 15.0         # [提速] 从10Hz提升到15Hz，更快控制响应
controller_patience: 3.0           # [缩短] 卡住3s就恢复，不白白等待

planner_frequency: 3.0             # [提速] 全局规划频率提升
planner_patience: 5.0

oscillation_timeout: 4.0           # [缩短] 更快检测并恢复振荡
oscillation_distance: 0.08         # [收紧] 振荡检测距离阈值

clearing_rotation_allowed: false

base_local_planner: "teb_local_planner/TebLocalPlannerROS"
base_global_planner: "global_planner/GlobalPlanner"

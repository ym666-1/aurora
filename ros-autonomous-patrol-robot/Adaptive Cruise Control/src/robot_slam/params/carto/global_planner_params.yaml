GlobalPlanner:
  old_navfn_behavior: false

  use_quadratic: true
  use_dijkstra: true
  use_grid_path: false

  # 封闭场地，不建议穿未知区域
  allow_unknown: false

  planner_window_x: 0.0
  planner_window_y: 0.0

  # 目标点不能容忍太大，否则靠近目标框会停偏
  default_tolerance: 0.05

  publish_scale: 100
  planner_costmap_publish_frequency: 0.0

  lethal_cost: 253
  neutral_cost: 50
  cost_factor: 3.0
  publish_potential: false
